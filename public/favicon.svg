<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Patrón de rayas diagonales azules -->
    <pattern id="diag" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#0096FF" stroke-width="1.5" />
    </pattern>
    <!-- Máscara con la forma de la letra A -->
    <mask id="letter-mask">
      <text
        x="16"
        y="27"
        text-anchor="middle"
        font-family="'Arial Black', 'Arial Bold', Gadget, sans-serif"
        font-size="28"
        font-weight="900"
        fill="white"
      >A</text>
    </mask>
  </defs>

  <!-- Relleno base dorado con rayas azules encima, recortado a la forma de la A -->
  <rect x="0" y="0" width="32" height="32" fill="#E0C58F" mask="url(#letter-mask)" />
  <rect x="0" y="0" width="32" height="32" fill="url(#diag)" mask="url(#letter-mask)" opacity="0.6" />

  <!-- Borde negro de la letra -->
  <text
    x="16"
    y="27"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Gadget, sans-serif"
    font-size="28"
    font-weight="900"
    fill="none"
    stroke="#000000"
    stroke-width="2"
  >A</text>
</svg>
